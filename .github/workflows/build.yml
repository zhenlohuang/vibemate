name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64

    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.os }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo test

      - name: Set build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          echo "VIBEMATE_BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os != 'windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="vibemate-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" vibemate
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="vibemate-${VERSION}-windows-x86_64.zip"
          cd target/${{ matrix.target }}/release
          7z a "../../../${ARCHIVE}" vibemate.exe
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: vibemate-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Resolve release notes
        id: release_notes
        run: |
          NOTE_FILE="docs/release_notes/rel_${GITHUB_REF_NAME}.md"
          if [ -f "${NOTE_FILE}" ]; then
            echo "has_note=true" >> "${GITHUB_OUTPUT}"
            echo "note_file=${NOTE_FILE}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_note=false" >> "${GITHUB_OUTPUT}"
            echo "No release note file found at ${NOTE_FILE}, fallback to auto-generated notes."
          fi

      - name: Create GitHub Release (custom notes)
        if: steps.release_notes.outputs.has_note == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.note_file }}
          files: vibemate-*

      - name: Create GitHub Release (auto-generated notes)
        if: steps.release_notes.outputs.has_note != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vibemate-*

  update_homebrew_tap:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate formula
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_ARM64_SHA="$(sha256sum "vibemate-${VERSION}-darwin-aarch64.tar.gz" | awk '{print $1}')"
          DARWIN_X86_64_SHA="$(sha256sum "vibemate-${VERSION}-darwin-x86_64.tar.gz" | awk '{print $1}')"
          LINUX_ARM64_SHA="$(sha256sum "vibemate-${VERSION}-linux-aarch64.tar.gz" | awk '{print $1}')"
          LINUX_X86_64_SHA="$(sha256sum "vibemate-${VERSION}-linux-x86_64.tar.gz" | awk '{print $1}')"

          cat > vibemate.rb <<EOF
          class Vibemate < Formula
            desc "Local CLI companion for coding agents"
            homepage "https://github.com/${REPO_OWNER}/vibemate"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO_OWNER}/vibemate/releases/download/v${VERSION}/vibemate-${VERSION}-darwin-aarch64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "https://github.com/${REPO_OWNER}/vibemate/releases/download/v${VERSION}/vibemate-${VERSION}-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_X86_64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO_OWNER}/vibemate/releases/download/v${VERSION}/vibemate-${VERSION}-linux-aarch64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/${REPO_OWNER}/vibemate/releases/download/v${VERSION}/vibemate-${VERSION}-linux-x86_64.tar.gz"
                sha256 "${LINUX_X86_64_SHA}"
              end
            end

            def install
              bin.install "vibemate"
            end

            test do
              assert_match "Usage", shell_output("#{bin}/vibemate --help")
            end
          end
          EOF

      - name: Update tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          TAP_REPO="zhenlohuang/homebrew-tap"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap-repo
          mkdir -p tap-repo/Formula
          cp vibemate.rb tap-repo/Formula/vibemate.rb

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No formula changes detected."
            exit 0
          fi

          git add Formula/vibemate.rb
          git commit -m "vibemate ${VERSION}"
          git push origin HEAD:main
