name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64

    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.os }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os != 'windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="vibemate-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" vibemate
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="vibemate-${VERSION}-windows-x86_64.zip"
          cd target/${{ matrix.target }}/release
          7z a "../../../${ARCHIVE}" vibemate.exe
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: vibemate-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vibemate-*
